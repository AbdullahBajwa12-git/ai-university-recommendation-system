name: Deploy StudyRoute Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: studyroute-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: StudyRouteGitHubDeploy

      - name: Send deployment command
        id: send-command
        shell: bash
        run: |
          set -euo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy StudyRoute backend commit ${{ github.sha }}" \
            --parameters '{"commands":["sudo /usr/local/bin/deploy-studyroute"]}' \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for deployment result
        shell: bash
        env:
          COMMAND_ID: ${{ steps.send-command.outputs.command_id }}
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail

          STATUS="Pending"

          for attempt in {1..120}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $attempt: $STATUS"

            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut)
                break
                ;;
            esac

            sleep 5
          done

          echo "===== Deployment Output ====="

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text || true

          ERROR_OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text 2>/dev/null || true)

          if [ -n "$ERROR_OUTPUT" ] && [ "$ERROR_OUTPUT" != "None" ]; then
            echo "===== Deployment Errors ====="
            echo "$ERROR_OUTPUT"
          fi

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed with status: $STATUS"
            exit 1
          fi

      - name: Verify public API
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            if curl -fsS https://api.studyroute.online/docs >/dev/null; then
              echo "StudyRoute API is online."
              exit 0
            fi

            echo "Waiting for API — attempt $attempt"
            sleep 5
          done

          echo "Public API health check failed."
          exit 1
