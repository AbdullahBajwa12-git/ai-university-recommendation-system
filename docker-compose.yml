version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: mongodb_fyp
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: backend_fyp
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://db:27017
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: frontend_fyp
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
